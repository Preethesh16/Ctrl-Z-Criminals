server {
    listen 80;
    client_max_body_size 60m;  # statement uploads (backend caps at 50 MB)

    # SPA: every route falls back to index.html
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: backend routes are UNPREFIXED — the trailing slash on proxy_pass
    # strips /api/ (same rewrite the Vite dev proxy does; see vite.config.ts).
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;  # OCR parse jobs on big scans
    }
}
